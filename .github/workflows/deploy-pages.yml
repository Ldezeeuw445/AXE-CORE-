name: Deploy to GitHub Pages
on:
  push:
    branches: [orchestrator]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          cd AXE-CORE-ORCHESTRATOR-content/AXE-CORE-HEADQUARTERS
          npm install

      - name: Build
        run: |
          cd AXE-CORE-ORCHESTRATOR-content/AXE-CORE-HEADQUARTERS
          npx vite build --config vite.config.ts
        env:
          CI: true

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: AXE-CORE-ORCHESTRATOR-content/AXE-CORE-HEADQUARTERS/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
