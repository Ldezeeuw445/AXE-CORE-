kind = "web"
previewPath = "/"
title = "AXE CORE Headquarters"
version = "1.0.0"
id = "artifacts/axe-core-hq"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19143

[services.development]
run = "pnpm --filter @workspace/axe-core-hq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/axe-core-hq", "run", "build" ]
serve = "static"
publicDir = "artifacts/axe-core-hq/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19143"
BASE_PATH = "/"
