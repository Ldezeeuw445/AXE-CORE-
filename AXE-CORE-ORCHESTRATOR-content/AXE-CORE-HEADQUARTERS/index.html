<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AXE CORE</title>
    <!-- Favicon & app icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- PWA meta -->
    <meta name="theme-color" content="#00D4FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AXE CORE" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="AXE CORE" />
    <style>
      /* Mobile app lock — prevent bounce, zoom, overscroll on phones */
      @media (max-width: 768px) {
        html, body {
          position: fixed;
          width: 100%;
          height: 100%;
          overflow: hidden;
          overscroll-behavior: none;
          -webkit-overflow-scrolling: auto;
          touch-action: manipulation;
        }
        #root {
          width: 100%;
          height: 100%;
          overflow: hidden;
        }
      }
      /* Desktop: normal scroll but no overscroll bounce */
      @media (min-width: 769px) {
        html, body {
          overscroll-behavior: none;
        }
      }
      /* Only allow scrolling inside designated scroll areas */
      .scrollable {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
