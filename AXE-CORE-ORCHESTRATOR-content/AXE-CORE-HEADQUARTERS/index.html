<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <title>AXE CORE</title>
    <!-- Favicon & app icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Leaflet CSS — fallback map when Google Maps fails -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- CesiumJS 3D Globe -->
    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" crossorigin="anonymous" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- PWA meta -->
    <meta name="theme-color" content="#00D4FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AXE CORE" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="AXE CORE" />
    <style>
      /* ================================================================
         CRITICAL: Every element in the chain must fill the viewport
         with black background. ANY gap = white bar visible.
         ================================================================ */
      html {
        min-height: 100dvh;
        background: #000000;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100dvh;
        background: #000000;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        color-scheme: dark;
      }
      #root {
        min-height: 100dvh;
        background: #000000;
        display: flex;
        flex-direction: column;
      }
      /* Prevent pull-to-refresh on mobile */
      @media (max-width: 768px) {
        body {
          overscroll-behavior-y: none;
          touch-action: manipulation;
        }
      }
      .scrollable {
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
      }
      .no-select {
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- CesiumJS 3D Globe -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js" crossorigin="anonymous"></script>
  </body>
  <!-- Leaflet JS — fallback map when Google Maps fails -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</html>
