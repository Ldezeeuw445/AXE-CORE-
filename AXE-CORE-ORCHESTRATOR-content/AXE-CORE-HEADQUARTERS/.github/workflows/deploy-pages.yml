name: Deploy to GitHub Pages
# Trigger: push to orchestrator branch OR manual run
on:
  push:
    branches: [orchestrator]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AXE-CORE-ORCHESTRATOR-content/AXE-CORE-HEADQUARTERS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AXE-CORE-ORCHESTRATOR-content/AXE-CORE-HEADQUARTERS/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: GITHUB_PAGES=true npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: AXE-CORE-ORCHESTRATOR-content/AXE-CORE-HEADQUARTERS/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
