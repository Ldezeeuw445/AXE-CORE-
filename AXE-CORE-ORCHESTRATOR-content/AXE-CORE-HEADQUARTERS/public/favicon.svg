<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="triGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0099CC"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" ry="112" fill="#0A0A10"/>
  <rect x="1" y="1" width="510" height="510" rx="111" ry="111" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <polygon points="256,112 414,384 98,384" fill="#00D4FF" opacity="0.10" filter="url(#glow)"/>
  <polygon points="256,112 414,384 98,384" fill="none" stroke="url(#triGrad)" stroke-width="20" stroke-linejoin="round" filter="url(#softglow)"/>
  <line x1="174" y1="335" x2="338" y2="335" stroke="#00D4FF" stroke-width="7" opacity="0.4" stroke-linecap="round"/>
  <circle cx="256" cy="112" r="10" fill="#00D4FF" opacity="0.75"/>
</svg>
