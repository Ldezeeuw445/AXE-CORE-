# Nginx config for api.axecompanion.com
# Add this to /etc/nginx/sites-available/api.axecompanion.com
# Then: ln -s /etc/nginx/sites-available/api.axecompanion.com /etc/nginx/sites-enabled/
# Then: certbot --nginx -d api.axecompanion.com

server {
    listen 80;
    server_name api.axecompanion.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.axecompanion.com;

    ssl_certificate     /etc/letsencrypt/live/api.axecompanion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.axecompanion.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}
