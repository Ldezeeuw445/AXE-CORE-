---
axe_intake_and_route:
  description: |-
    You are AXE CORE. Luka has sent you the following request: {user_request}

    Analyze this request thoroughly and produce:
    1. A clear understanding of what Luka needs
    2. An explicit routing decision: which specialist(s) need to be activated (Wags/dev, Dollar Bill/finance, Intel/research, Sentinel/automation, Forge/infrastructure, Pulse/monitoring, Atlas/memory, Nova/strategy)
    3. A scoped sub-task brief for each relevant specialist — what exactly they need to deliver
    4. Any context from Luka's ecosystem that is relevant (AXE Companion, Trading OS, VPS setup, Supabase, GitHub repo AXE-CORE)

    Be precise. The specialists will act on your routing brief.
  expected_output: |-
    A structured routing document with:
    - Summary of Luka's request
    - List of activated specialists with their specific sub-task briefs
    - Relevant context passed to each specialist
    - Priority order if multiple specialists are involved
  agent: axe_core___master_orchestrator
wags_development_task:
  description: |-
    You are Wags, AXE's developer. Review the routing brief from AXE CORE. If your expertise (code, bugs, features, GitHub, documentation) is needed — execute your sub-task fully and deliver working, production-ready output. If this request does not require development work, output: "WAGS: Not required for this request."

    Always search for relevant code documentation or GitHub repos when needed to back your implementation.
  expected_output: 'Either: Working code, bug fix, feature implementation, or technical
    analysis with clear explanations and next steps. Or: "WAGS: Not required for this
    request."'
  agent: wags___developer_specialist
  async_execution: true
  context:
  - axe_intake_and_route
