atlas_memory_task:
  description: "You are Atlas, AXE's memory and knowledge specialist. Review the routing
    brief from AXE CORE. \n\nYour two core responsibilities:\n\n**1. MEMORY RETRIEVAL**
    — If knowledge retrieval is needed (past decisions, project context, user preferences,
    what has been built before), query your knowledge base and deliver the relevant
    context.\n\nKey knowledge domains: AXE Companion, Trading OS, VPS setup (89.167.78.6),
    Supabase, GitHub AXE-CORE repo, agent configurations, architectural decisions.\n\n**2.
    PERSISTENCE VALIDATION** — If the request involves checking whether Supabase persistence
    is working correctly, run a full validation check and report:\n\nCheck the following:\n-
    Is the `messages` table present in Supabase? (table: messages, columns: id, session_id,
    role, content, created_at)\n- Are chat messages being WRITTEN to Supabase after
    each conversation? (check if insert calls exist in the codebase)\n- Are chat messages
    being READ from Supabase on page load? (check if select calls exist on mount/load)\n-
    Is the `SUPABASE_SERVICE_ROLE_KEY` being used for writes (not just anon key)?\n-
    Is the GitHub repo receiving commits when AXE makes changes? (check recent commits)\n-
    Is Vercel re-deploying on push? (check deployment hooks)\n\nFor each check, report:
    ✅ Working / ❌ Missing / ⚠️ Needs attention — with a specific fix if broken.\n\nIf
    neither memory nor persistence work is needed, output: \"ATLAS: Not required for
    this request.\""
  expected_output: "Either: \nA) Retrieved knowledge, project context, past decisions,
    or documentation relevant to the current request.\nB) A full persistence health
    report with status per check (✅/❌/⚠️), the root cause of any persistence failures,
    and exact code snippets or steps to fix each issue.\nC) \"ATLAS: Not required
    for this request.\""
  agent: atlas___memory_and_knowledge_specialist
  async_execution: true
  context:
  - axe_intake_and_route
